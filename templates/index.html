<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OwO Tools — Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#6c63ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="OwO Tools">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/service-worker.js');
        }
    </script>
</head>
<body>

    <header class="nav-area">
        <div class="nav-wrapper">
            <div class="nav-brand">OwO Tools</div>
            <div class="nav-links">
                <a href="/" class="nav-link active">Dashboard</a>
                <a href="/settings" class="nav-link">Settings</a>
            </div>
            <div class="nav-version">v{{ version }}</div>
        </div>
    </header>

    <div class="main-content-container">

        <!-- Overview Cards -->
        <div class="section-area" style="height:auto;">
            <h2>Overview</h2>
            <div class="cards-area">
                <div class="cards-wrapper">
                    <div class="card">
                        <div class="card-label">💸 Cash</div>
                        <div class="card-number" id="total_cash_card">—</div>
                        <div class="card-note">Total Cowoncy</div>
                    </div>
                    <div class="card">
                        <div class="card-label">⏱ Uptime</div>
                        <div class="card-number" id="total_uptime_card">—</div>
                        <div class="card-note">Hari Ini</div>
                    </div>
                    <div class="card">
                        <div class="card-label">🚀 Commands</div>
                        <div class="card-number" id="total_commands_card">—</div>
                        <div class="card-note">Total Terkirim</div>
                    </div>
                    <div class="card">
                        <div class="card-label">🛡 Captchas</div>
                        <div class="card-number" id="total_captchas_card">—</div>
                        <div class="card-note">Diselesaikan</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Console + Total Commands -->
        <div class="multi-items">
            <div class="section-area">
                <h2>Activity Console</h2>
                <div id="messages" class="messages"></div>
            </div>
            <div class="section-area">
                <h2>Total Commands Sent</h2>
                <div class="section-area-scroll">
                    <canvas id="total_commands"></canvas>
                </div>
            </div>
        </div>

        <!-- Cowoncy Earnings -->
        <div class="section-area">
            <h2>Cowoncy Earnings</h2>
            <div class="section-area-scroll">
                <canvas id="cowoncy_earnings"></canvas>
            </div>
        </div>

        <!-- Weekly Runtime -->
        <div class="section-area">
            <h2>Weekly Runtime</h2>
            <div class="section-area-scroll">
                <canvas id="weekly_runtimes"></canvas>
            </div>
        </div>

        <!-- Gamble Winrates -->
        <div class="section-area">
            <h2>Gamble Winrates</h2>
            <div class="section-area-scroll">
                <canvas id="gamble_earnings"></canvas>
            </div>
        </div>

    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
